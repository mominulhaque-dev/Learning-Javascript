<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Site</title>
    <style>
        body{font-family:sans-serif;margin:0;line-height:1.6;color:#333}
        header,footer{background:#222;color:#fff;text-align:center;padding:1rem}
        nav a{color:#fff;margin:0 10px;text-decoration:none}
        .hero{background:#eee;padding:40px;text-align:center}
        .container{width:90%;margin:auto;display:flex;gap:20px;padding:20px 0}
        .card{border:1px solid #ddd;padding:15px;flex:1;text-align:center;border-radius:5px}
        @media(max-width:600px){.container{flex-direction:column}}
    </style>
</head>
<body>
    <header><nav><a href="#">Home</a><a href="#">Services</a><a href="#">Contact</a></nav></header>
    <section class="hero"><h1>Digital Excellence</h1><p>Strategic growth and modern design.</p></section>
    <main class="container">
        <div class="card"><h3>Strategy</h3><p>Insightful planning.</p></div>
        <div class="card"><h3>Design</h3><p>User-centric UI.</p></div>
        <div class="card"><h3>Results</h3><p>Data-driven growth.</p></div>
    </main>
    <footer><p>&copy; 2026 Professional Brand</p></footer>
</body>
</html>
